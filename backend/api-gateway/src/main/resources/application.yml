server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: api-gateway
        instance-id: ${spring.application.name}:${random.value}
      enabled: false

    gateway:
      routes:
        # User Service routes
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service

        # Room Service routes (student)
        - id: room-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/rooms/**
          filters:
            - name: CircuitBreaker
              args:
                name: roomServiceCB
                fallbackUri: forward:/fallback/room-service

        # Room Service admin routes
        - id: room-admin-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/admin/rooms/**

        # Booking Service routes (student)
        - id: booking-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/bookings/**

        # Booking Service admin routes
        - id: booking-admin-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/admin/bookings/**

        # Notification Service routes
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**

        # Swagger UI routes for each service
        - id: user-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/user-service/v3/api-docs/**

        - id: room-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/room-service/v3/api-docs/**

        - id: booking-service-docs
          uri: http://localhost:8085
          predicates:
            - Path=/booking-service/v3/api-docs/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
