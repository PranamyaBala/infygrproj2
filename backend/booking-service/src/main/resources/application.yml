server:
  port: 8085

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:mysql://localhost:3306/hostel_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: booking-service
        instance-id: ${spring.application.name}:${random.value}
      enabled: false

# Feign client URLs (used when Consul is disabled)
services:
  room-service:
    url: http://localhost:8083
  user-service:
    url: http://localhost:8081
  notification-service:
    url: http://localhost:8087

# Circuit Breaker Configuration (per SRS requirements)
resilience4j:
  circuitbreaker:
    instances:
      roomService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
        minimum-number-of-calls: 5
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - com.hostel.booking.exception.BookingConflictException
      userService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        slow-call-duration-threshold: 3s
      notificationService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        slow-call-duration-threshold: 3s

  timelimiter:
    instances:
      roomService:
        timeout-duration: 3s
      userService:
        timeout-duration: 3s
      notificationService:
        timeout-duration: 3s

# Feign
spring.cloud.openfeign.circuitbreaker.enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.hostel.booking: DEBUG
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
