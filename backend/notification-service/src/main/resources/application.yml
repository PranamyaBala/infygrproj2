server:
  port: 8087

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/hostel_notification_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Gmail SMTP - configure for production
  # To use: enable 2FA on Gmail, generate App Password, put it below
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: notification-service
        instance-id: ${spring.application.name}:${random.value}
      enabled: false

# App config
app:
  notifications:
    enabled: false  # Set to true for production (sends real emails)

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hostel.notification: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
